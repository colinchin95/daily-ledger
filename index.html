<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>日常記帳</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="記帳">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <div class="nav-bar">
      <button id="lang-btn" class="nav-btn left" type="button">EN</button>
      <button id="cat-manage-btn" class="nav-btn" type="button" data-i18n="settings">設定</button>
    </div>
    <h1 class="large-title" data-i18n="appTitle">日常記帳</h1>
  </header>

  <!-- 明細 -->
  <main id="view-list" class="view">
    <div id="backup-banner" class="backup-banner" hidden>
      <div class="backup-banner-row">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 3 5 6v5c0 4.2 2.9 7.6 7 9 4.1-1.4 7-4.8 7-9V6l-7-3Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="m9 11.5 2 2 4-4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="backup-banner-text"></span>
      </div>
      <div class="backup-banner-actions">
        <button id="backup-banner-later" class="backup-banner-btn backup-banner-later" type="button" data-i18n="later">稍後</button>
        <button id="backup-banner-now" class="backup-banner-btn backup-banner-now" type="button" data-i18n="backupNow">立即備份</button>
      </div>
    </div>
    <div class="search-bar">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/><path d="m20 20-3.2-3.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <input id="search-input" class="search-input" type="search" data-i18n-ph="searchPlaceholder" placeholder="搜尋備註、分類或金額" autocomplete="off">
      <button id="search-clear" class="search-clear" type="button" aria-label="clear" hidden>✕</button>
    </div>
    <div id="entry-list" class="entry-list"></div>
    <div id="empty-state" class="empty-state" hidden>
      <div class="empty-icon">✦</div>
      <p data-i18n="emptyTitle">還沒有任何帳目</p>
      <p class="empty-hint" data-i18n="emptyHint">點下方「＋」記下第一筆</p>
    </div>
  </main>

  <!-- 報表 -->
  <main id="view-report" class="view" hidden>
    <div class="month-nav">
      <button id="month-prev" class="month-arrow" type="button" aria-label="prev">‹</button>
      <span id="month-label" class="month-label"></span>
      <button id="month-next" class="month-arrow" type="button" aria-label="next">›</button>
    </div>

    <section class="card summary-card">
      <div class="summary-caption" data-i18n="monthSpending">本月支出</div>
      <div id="report-expense" class="summary-amount">RM 0.00</div>
      <div class="summary-sub">
        <span><span data-i18n="income">收入</span> <span id="report-income" class="num income-text">RM 0.00</span></span>
        <span class="summary-divider"></span>
        <span><span data-i18n="balance">結餘</span> <span id="report-balance" class="num">RM 0.00</span></span>
      </div>
    </section>

    <section id="budget-card" class="card budget-card" hidden></section>

    <div class="seg" id="report-seg">
      <button class="seg-btn active" data-type="expense" type="button" data-i18n="expense">支出</button>
      <button class="seg-btn" data-type="income" type="button" data-i18n="income">收入</button>
    </div>

    <section id="trend-card" class="card trend-card"></section>

    <section id="report-breakdown" class="card breakdown-card"></section>
  </main>

  <!-- 底部 Tab Bar -->
  <nav class="tab-bar">
    <button id="tab-list" class="tab-btn active" type="button">
      <svg viewBox="0 0 24 24" fill="none"><path d="M4 6.5h16M4 12h16M4 17.5h9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <span data-i18n="entries">明細</span>
    </button>
    <button id="add-btn" class="tab-add" type="button" aria-label="add">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
    </button>
    <button id="tab-report" class="tab-btn" type="button">
      <svg viewBox="0 0 24 24" fill="none"><path d="M5 20v-8M12 20V5M19 20v-5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
      <span data-i18n="reports">報表</span>
    </button>
  </nav>

  <!-- 記帳/編輯 面板 -->
  <div id="sheet-backdrop" class="backdrop"></div>
  <section id="sheet" class="sheet">
    <div class="grabber"></div>
    <div class="sheet-header">
      <button id="sheet-cancel" class="sheet-header-btn" type="button" data-i18n="cancel">取消</button>
      <div class="seg seg-small" id="type-seg">
        <button class="seg-btn active" data-type="expense" type="button" data-i18n="expense">支出</button>
        <button class="seg-btn" data-type="income" type="button" data-i18n="income">收入</button>
      </div>
      <button id="sheet-delete" class="sheet-header-btn danger" type="button" data-i18n="delete" hidden>刪除</button>
    </div>

    <div class="amount-display">
      <span class="amount-currency">RM</span>
      <span id="amount-text">0</span>
    </div>

    <div id="category-row" class="category-row"></div>

    <div class="field-row">
      <input id="note-input" class="field-input" type="text" data-i18n-ph="notePlaceholder" placeholder="備註（可空）" maxlength="60">
      <input id="date-input" class="field-input date-input" type="date">
    </div>

    <div class="keypad">
      <button class="key" data-key="1" type="button">1</button>
      <button class="key" data-key="2" type="button">2</button>
      <button class="key" data-key="3" type="button">3</button>
      <button class="key" data-key="4" type="button">4</button>
      <button class="key" data-key="5" type="button">5</button>
      <button class="key" data-key="6" type="button">6</button>
      <button class="key" data-key="7" type="button">7</button>
      <button class="key" data-key="8" type="button">8</button>
      <button class="key" data-key="9" type="button">9</button>
      <button class="key" data-key="." type="button">·</button>
      <button class="key" data-key="0" type="button">0</button>
      <button class="key key-del" data-key="del" type="button">
        <svg viewBox="0 0 24 24" fill="none" width="22" height="22"><path d="M8.4 5h10.1A2.5 2.5 0 0 1 21 7.5v9a2.5 2.5 0 0 1-2.5 2.5H8.4a2 2 0 0 1-1.5-.7L3 13.3a2 2 0 0 1 0-2.6l3.9-5A2 2 0 0 1 8.4 5Z" stroke="currentColor" stroke-width="1.7"/><path d="m11 9.5 5 5M16 9.5l-5 5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
      </button>
    </div>

    <button id="save-btn" class="save-btn" type="button" data-i18n="save">儲存</button>
  </section>

  <!-- 設定:分類管理 + 資料備份 -->
  <section id="cat-modal" class="modal">
    <div class="nav-bar modal-nav">
      <span class="nav-spacer"></span>
      <span class="modal-title" data-i18n="settings">設定</span>
      <button id="cat-done-btn" class="nav-btn strong" type="button" data-i18n="done">完成</button>
    </div>

    <div class="section-label" data-i18n="categoriesSection">分類</div>
    <div class="seg" id="cat-seg">
      <button class="seg-btn active" data-type="expense" type="button" data-i18n="expenseCats">支出分類</button>
      <button class="seg-btn" data-type="income" type="button" data-i18n="incomeCats">收入分類</button>
    </div>
    <div id="cat-list" class="cat-list"></div>

    <div class="section-label" data-i18n="monthlyBudget">每月總預算</div>
    <div class="cat-list">
      <label class="cat-row budget-row">
        <span class="budget-field-prefix">RM</span>
        <input id="budget-input" class="budget-inline-input num" type="text" inputmode="decimal" placeholder="0.00">
      </label>
    </div>

    <div class="section-label" data-i18n="recurringSection">固定支出</div>
    <div id="recur-list" class="cat-list"></div>
    <p class="backup-hint" data-i18n="recurringHint">每月自動產生一筆,可照常編輯或刪除。</p>

    <div class="section-label" data-i18n="backupSection">資料備份</div>
    <div class="cat-list">
      <button id="export-btn" class="cat-row cat-row-add" type="button">
        <svg class="row-icon" viewBox="0 0 24 24" fill="none"><path d="M12 15V4M8 7.5 12 3.5l4 4M5 20h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="cat-row-name" data-i18n="exportBackup">匯出 JSON 備份</span>
      </button>
      <button id="export-csv-btn" class="cat-row cat-row-add" type="button">
        <svg class="row-icon" viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="1.7"/><path d="M4 10h16M4 15h16M10 4v16" stroke="currentColor" stroke-width="1.4"/></svg>
        <span class="cat-row-name" data-i18n="exportCsv">匯出 CSV(試算表)</span>
      </button>
      <button id="import-btn" class="cat-row cat-row-add" type="button">
        <svg class="row-icon" viewBox="0 0 24 24" fill="none"><path d="M12 4v11M8 11.5l4 4 4-4M5 20h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="cat-row-name" data-i18n="importBackup">匯入 JSON 備份</span>
      </button>
    </div>
    <p class="backup-hint" data-i18n="backupHint">帳目只存在這台裝置上,建議定期匯出備份。</p>
    <p class="backup-hint" id="backup-status"></p>
    <input type="file" id="import-file" accept=".json,application/json" hidden>

    <div class="section-label" data-i18n="syncSection">雲端同步</div>
    <div class="cat-list">
      <button id="sync-row" class="cat-row" type="button">
        <svg class="row-icon" viewBox="0 0 24 24" fill="none"><path d="M4 12a8 8 0 0 1 13.7-5.6L20 8M20 4v4h-4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/><path d="M20 12a8 8 0 0 1-13.7 5.6L4 16m0 4v-4h4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="cat-row-name" data-i18n="syncSetup">雲端同步</span>
        <span id="sync-status" class="cat-row-count"></span>
        <span class="cat-row-chevron">›</span>
      </button>
    </div>

    <div class="section-label" data-i18n="lockSection">App 鎖</div>
    <div class="cat-list">
      <button id="lock-row" class="cat-row" type="button">
        <svg class="row-icon" viewBox="0 0 24 24" fill="none"><rect x="5" y="10" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M8 10V7a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="1.8"/></svg>
        <span class="cat-row-name" data-i18n="setPin">設定 PIN 碼</span>
        <span id="lock-status" class="cat-row-count"></span>
        <span class="cat-row-chevron">›</span>
      </button>
    </div>
    <p class="backup-hint" data-i18n="lockHint">開啟後每次打開 App 需輸入 PIN(僅存在本機,不含在備份中)。</p>

    <div class="section-label" data-i18n="appSection">App</div>
    <div class="cat-list">
      <button id="refresh-btn" class="cat-row cat-row-add" type="button">
        <svg class="row-icon" viewBox="0 0 24 24" fill="none"><path d="M21 12a9 9 0 1 1-2.64-6.36" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M21 4v5h-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="cat-row-name" data-i18n="updateLatest">更新到最新版</span>
        <span id="app-version" class="cat-row-count"></span>
      </button>
    </div>
    <p class="backup-hint" data-i18n="updateHint">下載最新版本並重新整理(資料不受影響)。</p>
  </section>

  <!-- 分類編輯器 -->
  <div id="cat-editor-backdrop" class="backdrop editor-backdrop"></div>
  <section id="cat-editor" class="sheet cat-editor">
    <div class="grabber"></div>
    <div class="sheet-header">
      <button id="cat-editor-cancel" class="sheet-header-btn" type="button" data-i18n="cancel">取消</button>
      <span id="cat-editor-title" class="sheet-title">編輯分類</span>
      <button id="cat-editor-save" class="sheet-header-btn strong" type="button" data-i18n="save">儲存</button>
    </div>
    <input id="cat-name-input" class="field-input cat-name-input" type="text" data-i18n-ph="categoryName" placeholder="分類名稱" maxlength="12">
    <div id="color-grid" class="color-grid"></div>
    <label id="cat-budget-field" class="budget-field">
      <span class="budget-field-prefix">RM</span>
      <input id="cat-budget-input" class="field-input" type="text" inputmode="decimal" data-i18n-ph="categoryBudget" placeholder="每月預算（可空）">
    </label>
    <button id="cat-delete-btn" class="cat-delete-btn" type="button" data-i18n="deleteCategory" hidden>刪除分類</button>
  </section>

  <!-- 固定支出編輯器 -->
  <div id="recur-editor-backdrop" class="backdrop editor-backdrop"></div>
  <section id="recur-editor" class="sheet cat-editor">
    <div class="grabber"></div>
    <div class="sheet-header">
      <button id="recur-cancel" class="sheet-header-btn" type="button" data-i18n="cancel">取消</button>
      <span id="recur-editor-title" class="sheet-title">固定支出</span>
      <button id="recur-save" class="sheet-header-btn strong" type="button" data-i18n="save">儲存</button>
    </div>
    <div class="seg seg-small recur-seg" id="recur-type-seg">
      <button class="seg-btn active" data-type="expense" type="button" data-i18n="expense">支出</button>
      <button class="seg-btn" data-type="income" type="button" data-i18n="income">收入</button>
    </div>
    <label class="budget-field">
      <span class="budget-field-prefix">RM</span>
      <input id="recur-amount-input" class="field-input" type="text" inputmode="decimal" data-i18n-ph="amountLabel" placeholder="金額">
    </label>
    <div id="recur-cat-row" class="category-row"></div>
    <div class="field-row">
      <input id="recur-note-input" class="field-input" type="text" data-i18n-ph="notePlaceholder" placeholder="備註（可空）" maxlength="60">
      <label class="day-field">
        <span class="day-prefix" data-i18n="dayOfMonth">每月幾號</span>
        <input id="recur-day-input" class="field-input day-input num" type="number" min="1" max="28" value="1">
      </label>
    </div>
    <button id="recur-delete-btn" class="cat-delete-btn" type="button" data-i18n="delete" hidden>刪除</button>
  </section>

  <!-- 雲端同步設定 -->
  <div id="sync-sheet-backdrop" class="backdrop editor-backdrop"></div>
  <section id="sync-sheet" class="sheet cat-editor">
    <div class="grabber"></div>
    <div class="sheet-header">
      <button id="sync-cancel" class="sheet-header-btn" type="button" data-i18n="cancel">取消</button>
      <span class="sheet-title" data-i18n="syncSetup">雲端同步</span>
      <span style="min-width:52px"></span>
    </div>
    <p class="sync-intro" data-i18n="syncIntro"></p>
    <div class="sync-code-label" data-i18n="syncCodeLabel">同步碼</div>
    <div class="sync-code-field">
      <input id="sync-code-input" class="field-input" type="text" autocomplete="off" autocapitalize="characters" autocorrect="off" spellcheck="false">
      <button id="sync-generate" class="sync-inline-btn" type="button" data-i18n="syncGenerate">產生新的</button>
    </div>
    <p class="sync-warn" id="sync-warn" data-i18n="syncSavedWarn"></p>
    <button id="sync-enable" class="save-btn" type="button" data-i18n="syncEnable">啟用同步</button>
    <button id="sync-copy" class="cat-delete-btn sync-secondary" type="button" data-i18n="syncCopy" hidden>複製同步碼</button>
    <button id="sync-disable" class="cat-delete-btn" type="button" data-i18n="syncDisable" hidden>停止同步</button>
  </section>

  <!-- 分類明細(點報表分類進入) -->
  <section id="detail-modal" class="modal detail-level">
    <div class="nav-bar modal-nav">
      <button id="detail-back-btn" class="nav-btn left" type="button">‹ <span data-i18n="back">返回</span></button>
      <span id="detail-title" class="modal-title"></span>
      <span class="nav-spacer"></span>
    </div>
    <div id="detail-summary" class="detail-summary"></div>
    <div id="detail-list" class="cat-list"></div>
  </section>

  <!-- PIN 鎖屏 -->
  <div id="lock-screen" class="lock-screen" hidden>
    <div class="lock-inner">
      <svg class="lock-glyph" viewBox="0 0 24 24" fill="none"><rect x="5" y="10" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M8 10V7a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="1.6"/></svg>
      <div id="lock-title" class="lock-title"></div>
      <div id="lock-dots" class="lock-dots"></div>
      <div id="lock-error" class="lock-error"></div>
      <div class="lock-keypad">
        <button class="key lock-key" data-key="1" type="button">1</button>
        <button class="key lock-key" data-key="2" type="button">2</button>
        <button class="key lock-key" data-key="3" type="button">3</button>
        <button class="key lock-key" data-key="4" type="button">4</button>
        <button class="key lock-key" data-key="5" type="button">5</button>
        <button class="key lock-key" data-key="6" type="button">6</button>
        <button class="key lock-key" data-key="7" type="button">7</button>
        <button class="key lock-key" data-key="8" type="button">8</button>
        <button class="key lock-key" data-key="9" type="button">9</button>
        <span></span>
        <button class="key lock-key" data-key="0" type="button">0</button>
        <button class="key lock-key key-del" data-key="del" type="button">⌫</button>
      </div>
      <button id="lock-done" class="save-btn lock-done" type="button" data-i18n="done" hidden>完成</button>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
